name: SML ASC — Compile, Test, Deploy

on:
  push:
    branches: [master]
    paths:
      - "asc-contracts/**"
      - "src/asc/**"
      - "src/bridges/**"
      - "wrangler.toml"
      - ".github/workflows/asc-deploy.yml"
  pull_request:
    paths:
      - "asc-contracts/**"
      - "src/asc/**"
      - "src/bridges/**"

jobs:
  contracts:
    name: Compile & test Solidity contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asc-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run compile
      - run: npm test

  orchestrator:
    name: Lint & typecheck SML orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test -- test/GhostBridge.test.ts

  deploy:
    name: Deploy orchestrator to Cloudflare Workers
    needs: [contracts, orchestrator]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Check Cloudflare credentials
        id: cf_check
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID are not set on this repo yet, so the Worker deploy is being skipped rather than failed. See docs/SML_ASC_ARCHITECTURE.md for what's still required before this deploys for real."
          fi
      - uses: cloudflare/wrangler-action@v3
        if: steps.cf_check.outputs.configured == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
