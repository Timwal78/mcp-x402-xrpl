name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts-test:
    name: Contract test suite (deterministic, no secrets needed)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run compile
      - run: npm test

  typecheck:
    name: Orchestrator typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npx tsc --noEmit
